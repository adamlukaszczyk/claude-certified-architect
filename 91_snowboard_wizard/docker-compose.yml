services:
  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://${POSTGRES_USER:-wizard}:${POSTGRES_PASSWORD:-wizard}@postgres:5432/${POSTGRES_DB:-wizard}
      - REDIS_URL=redis://redis:6379
    env_file:
      - path: .env.local
        required: false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    develop:
      watch:
        - action: sync+restart
          path: ./apps/api/src
          target: /app/apps/api/src

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wizard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wizard}
      POSTGRES_DB: ${POSTGRES_DB:-wizard}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wizard}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  consul-server:
    image: hashicorp/consul:2.0.1
    container_name: consul-server
    restart: always
    volumes:
      - consul_data:/consul/data
    ports:
      - "8500:8500" # Web UI and HTTP API
      - "8600:8600/udp" # DNS Server
    command: "agent -server -bootstrap-expect=1 -ui -bind=0.0.0.0 -client=0.0.0.0"

  redis-exporter:
    image: oliver006/redis_exporter:v1.86.0
    environment:
      - REDIS_ADDR=redis://redis:6379
    ports:
      - "9121:9121"
    depends_on:
      - redis

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.19.1
    environment:
      - DATA_SOURCE_NAME=postgresql://${POSTGRES_USER:-wizard}:${POSTGRES_PASSWORD:-wizard}@postgres:5432/${POSTGRES_DB:-wizard}?sslmode=disable
    ports:
      - "9187:9187"
    depends_on:
      postgres:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v3.5.4
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    depends_on:
      - consul-server
      - redis-exporter
      - postgres-exporter

volumes:
  postgres_data:
  consul_data:
  prometheus_data:
