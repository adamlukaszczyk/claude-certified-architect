global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Scrape Prometheus itself
  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]

  # Discover and scrape services registered in Consul
  - job_name: consul-services
    consul_sd_configs:
      - server: consul-server:8500
        refresh_interval: 10s
    relabel_configs:
      # Use the Consul service name as the job label
      - source_labels: [__meta_consul_service]
        target_label: job
      # Use the Consul service address and port as the scrape target
      - source_labels: [__meta_consul_service_address, __meta_consul_service_port]
        separator: ':'
        target_label: __address__
      # Copy Consul tags as a label
      - source_labels: [__meta_consul_tags]
        target_label: consul_tags
      # Drop the consul service itself from scraping
      - source_labels: [__meta_consul_service]
        regex: consul
        action: drop
